kind = "web"
  previewPath = "/piq/"
  title = "PerformIQ"
  version = "1.0.0"
  id = "artifacts/performiq"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/piq/" ]
  localPort = 5173

  [services.development]
  run = "pnpm --filter @workspace/performiq run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/performiq", "run", "build" ]
  publicDir = "frontend/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "5173"
  BASE_PATH = "/piq/"
