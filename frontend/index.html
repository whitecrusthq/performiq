<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>PerformIQ</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Apply cached brand colour synchronously so the page never flashes the
      // default blue before the user's saved theme loads from /api/app-settings.
      (function () {
        try {
          var raw = localStorage.getItem("performiq.appSettings");
          if (!raw) return;
          var s = JSON.parse(raw);
          if (s && typeof s.primaryHsl === "string" && s.primaryHsl) {
            document.documentElement.style.setProperty("--primary", s.primaryHsl);
            document.documentElement.style.setProperty("--ring", s.primaryHsl);
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
