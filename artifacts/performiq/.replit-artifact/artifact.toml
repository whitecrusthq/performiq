kind = "web"
previewPath = "/"
title = "PerformIQ"
version = "1.0.0"
id = "artifacts/performiq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 8080

[services.development]
run = "npm run dev"

[services.production]
build = ["bash", "-c", "cd ../../frontend && npm run build"]
publicDir = "frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8080"
BASE_PATH = "/"
